<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>潘朵拉魔盒 - Arcade - BBJin Web</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            overflow: hidden;
            height: 100vh;
        }
        .game-world {
            position: relative;
            width: 100%;
            height: 100vh;
            background: radial-gradient(circle at center, #1a0b2e 0%, #050505 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        /* Timer */
        #game-timer {
            position: absolute;
            top: 100px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 4rem;
            font-weight: 800;
            color: #ff3e3e;
            text-shadow: 0 0 20px rgba(255, 62, 62, 0.5);
            letter-spacing: -2px;
        }
        /* Pandora's Box */
        .box-container {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .pandora-box {
            width: 150px;
            height: 150px;
            background: rgba(138, 43, 226, 0.1);
            border: 2px solid #8a2be2;
            box-shadow: 0 0 50px rgba(138, 43, 226, 0.4), inset 0 0 20px rgba(138, 43, 226, 0.4);
            position: relative;
            transform-style: preserve-3d;
            animation: float 3s ease-in-out infinite;
            z-index: 10;
        }
        .pandora-box::before, .pandora-box::after {
            content: '';
            position: absolute;
            inset: -10px;
            border: 1px solid #00d2ff;
            opacity: 0.5;
            animation: rotate 10s linear infinite;
        }
        .pandora-box::after {
            animation-duration: 15s;
            animation-direction: reverse;
        }
        .currency-count {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 10px #8a2be2;
            z-index: 11;
        }

        /* Particles/Arrows */
        .arrow {
            position: absolute;
            width: 40px;
            height: 4px;
            border-radius: 2px;
            z-index: 5;
        }

        /* Stats Board */
        .stats-board {
            position: absolute;
            right: 40px;
            top: 120px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2rem;
            width: 300px;
            font-family: 'Inter', sans-serif;
        }
        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        .stat-label { color: var(--text-secondary); }
        .stat-value { color: #fff; font-weight: 600; }
        .p1-color { color: #3b82f6; }
        .p2-color { color: #ef4444; }
        .p3-color { color: #10b981; }

        /* Controls Info */
        .controls-info {
            position: absolute;
            left: 40px;
            bottom: 40px;
            color: var(--text-secondary);
            font-size: 0.8rem;
        }
        .key-hint {
            display: inline-block;
            padding: 2px 8px;
            background: #333;
            border-radius: 4px;
            color: #fff;
            margin-right: 10px;
        }

        /* Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(45deg); }
            50% { transform: translateY(-20px) rotate(45deg); }
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes fly-p1 {
            from { left: -100px; top: 50%; transform: scale(1); opacity: 1; }
            to { left: 50%; top: 50%; transform: scale(0.1); opacity: 0; }
        }
        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(5px, 5px); }
            50% { transform: translate(-5px, -5px); }
            75% { transform: translate(5px, -5px); }
        }
        .shake { animation: shake 0.1s linear infinite; border-color: #ff3e3e !important; }

        .game-over-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">BBJin WEB</a>
            <div class="nav-links">
                <a href="index.html">首頁</a>
                <a href="tools.html">CCC Code 小工具</a>
                <a href="hscode.html">海關編碼查詢</a>
                <a href="game.html" class="active">遊戲專區</a>
            </div>
        </div>
    </nav>

    <div class="game-world">
        <div id="game-timer">45.00</div>

        <div class="box-container">
            <div class="pandora-box" id="main-box">
                <div class="currency-count" id="count-display">0</div>
            </div>
        </div>

        <div class="stats-board">
            <h3 style="margin-bottom: 1.5rem; border-bottom: 1px solid #333; padding-bottom: 0.5rem;">即時戰報</h3>
            <div class="stat-item">
                <span class="stat-label p1-color">玩家 1 (A)</span>
                <span class="stat-value" id="p1-score">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label p2-color">玩家 2 (G)</span>
                <span class="stat-value" id="p2-score">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label p3-color">玩家 3 (L)</span>
                <span class="stat-value" id="p3-score">0</span>
            </div>
            <div style="margin: 1rem 0; height: 1px; background: #333;"></div>
            <div class="stat-item">
                <span class="stat-label">系統回收總計</span>
                <span class="stat-value" id="sys-collected">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">P1 預估分紅 (30%)</span>
                <span class="stat-value" id="p1-dividend">0.0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">每日救濟水池 (10%)</span>
                <span class="stat-value" id="relief-pool">0.0</span>
            </div>
        </div>

        <div class="controls-info">
            <p><span class="key-hint">A</span> 玩家 1 (藍) | <span class="key-hint">G</span> 玩家 2 (紅) | <span class="key-hint">L</span> 玩家 3 (綠)</p>
            <p style="margin-top: 0.5rem;">規則：每秒產出 1 貨幣。第 12 個由系統產出則炸裂；由玩家射入則通吃(10顆)。</p>
        </div>
    </div>

    <div class="game-over-overlay" id="game-over">
        <h1 id="winner-text" style="font-size: 3rem; margin-bottom: 1rem;">遊戲結束</h1>
        <p id="reason-text" style="color: var(--text-secondary); margin-bottom: 2rem;"></p>
        <button class="btn btn-primary" onclick="location.reload()">重新開局</button>
    </div>

    <script>
        const state = {
            count: 0,
            timeLeft: 45.00,
            p1Score: 0,
            p2Score: 0,
            p3Score: 0,
            sysCollected: 0,
            isGameOver: false
        };

        const countDisplay = document.getElementById('count-display');
        const timerDisplay = document.getElementById('game-timer');
        const box = document.getElementById('main-box');
        const gameOverOverlay = document.getElementById('game-over');
        const winnerText = document.getElementById('winner-text');
        const reasonText = document.getElementById('reason-text');

        // Stats elements
        const p1ScoreEl = document.getElementById('p1-score');
        const p2ScoreEl = document.getElementById('p2-score');
        const p3ScoreEl = document.getElementById('p3-score');
        const sysCollectedEl = document.getElementById('sys-collected');
        const p1DividendEl = document.getElementById('p1-dividend');
        const reliefPoolEl = document.getElementById('relief-pool');

        function updateUI() {
            countDisplay.innerText = state.count;
            timerDisplay.innerText = state.timeLeft.toFixed(2);
            p1ScoreEl.innerText = state.p1Score;
            p2ScoreEl.innerText = state.p2Score;
            p3ScoreEl.innerText = state.p3Score;
            sysCollectedEl.innerText = state.sysCollected;
            p1DividendEl.innerText = (state.sysCollected * 0.3).toFixed(1);
            reliefPoolEl.innerText = (state.sysCollected * 0.1).toFixed(1);

            if (state.count >= 10) {
                box.classList.add('shake');
            } else {
                box.classList.remove('shake');
            }
        }

        function triggerWin(playerIndex) {
            state.isGameOver = true;
            const winners = ["玩家 1", "玩家 2", "玩家 3"];
            const winner = winners[playerIndex - 1];
            
            if (playerIndex === 1) state.p1Score += 10;
            if (playerIndex === 2) state.p2Score += 10;
            if (playerIndex === 3) state.p3Score += 10;
            state.sysCollected += 2;
            
            winnerText.innerText = `🎉 ${winner} 成功封印魔盒！`;
            winnerText.style.color = playerIndex === 1 ? '#3b82f6' : (playerIndex === 2 ? '#ef4444' : '#10b981');
            reasonText.innerText = `獲得 10 貨幣，系統收取 2 貨幣手續費。`;
            gameOverOverlay.style.display = 'flex';
            updateUI();
        }

        function triggerExplode() {
            state.isGameOver = true;
            state.sysCollected += state.count;
            state.count = 0;
            
            winnerText.innerText = `💥 魔盒失控爆裂！`;
            winnerText.style.color = '#ff3e3e';
            reasonText.innerText = `系統沒收了所有貨幣。`;
            gameOverOverlay.style.display = 'flex';
            updateUI();
        }

        // System Auto-Generation
        const sysInterval = setInterval(() => {
            if (state.isGameOver) return;
            state.count++;
            if (state.count >= 12) {
                triggerExplode();
                clearInterval(sysInterval);
            }
            updateUI();
        }, 1000);

        // Timer
        const timerInterval = setInterval(() => {
            if (state.isGameOver) return;
            state.timeLeft -= 0.01;
            if (state.timeLeft <= 0) {
                state.timeLeft = 0;
                state.isGameOver = true;
                winnerText.innerText = "⏰ 時間到！";
                reasonText.innerText = "沒人能在時間內征服魔盒。";
                gameOverOverlay.style.display = 'flex';
                clearInterval(timerInterval);
            }
            updateUI();
        }, 10);

        // Player Inputs
        window.addEventListener('keydown', (e) => {
            if (state.isGameOver) return;
            
            let player = 0;
            let color = '';
            
            if (e.key.toLowerCase() === 'a') { player = 1; color = '#3b82f6'; }
            if (e.key.toLowerCase() === 'g') { player = 2; color = '#ef4444'; }
            if (e.key.toLowerCase() === 'l') { player = 3; color = '#10b981'; }
            
            if (player > 0) {
                createArrow(player, color);
                state.count++;
                if (state.count >= 12) {
                    triggerWin(player);
                }
                updateUI();
            }
        });

        function createArrow(player, color) {
            const arrow = document.createElement('div');
            arrow.className = 'arrow';
            arrow.style.backgroundColor = color;
            arrow.style.boxShadow = `0 0 10px ${color}`;
            
            // Random start position from edges
            const sides = ['left', 'right', 'top', 'bottom'];
            const side = sides[Math.floor(Math.random() * 4)];
            
            if (side === 'left') { arrow.style.left = '-50px'; arrow.style.top = Math.random() * 100 + '%'; }
            else if (side === 'right') { arrow.style.right = '-50px'; arrow.style.top = Math.random() * 100 + '%'; }
            else if (side === 'top') { arrow.style.top = '-50px'; arrow.style.left = Math.random() * 100 + '%'; }
            else { arrow.style.bottom = '-50px'; arrow.style.left = Math.random() * 100 + '%'; }

            document.querySelector('.game-world').appendChild(arrow);
            
            // Animation to center
            const rect = box.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            arrow.animate([
                { transform: `translate(0, 0) scale(1)`, opacity: 1 },
                { transform: `translate(${centerX - arrow.offsetLeft}px, ${centerY - arrow.offsetTop}px) scale(0)`, opacity: 0 }
            ], {
                duration: 400,
                easing: 'ease-in'
            }).onfinish = () => arrow.remove();
        }
    </script>
</body>
</html>
